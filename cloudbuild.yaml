steps:
  # Build Docker image
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/community-hero:$SHORT_SHA
      - -t
      - gcr.io/$PROJECT_ID/community-hero:latest
      - .

  # Push to Container Registry
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/community-hero:$SHORT_SHA

  # Deploy to Cloud Run
  - name: gcr.io/cloud-builders/gke-deploy
    args:
      - run
      - --filename=.
      - --image=gcr.io/$PROJECT_ID/community-hero:$SHORT_SHA
      - --location=us-central1
      - --namespace=default

  # Alternative: Use gcloud to deploy directly to Cloud Run
  - name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - community-hero-backend
      - --image=gcr.io/$PROJECT_ID/community-hero:$SHORT_SHA
      - --platform=managed
      - --region=us-central1
      - --allow-unauthenticated
      - --memory=512Mi
      - --cpu=1
      - --timeout=3600s
      - --set-env-vars=NODE_ENV=production,PORT=8080

images:
  - gcr.io/$PROJECT_ID/community-hero:$SHORT_SHA
  - gcr.io/$PROJECT_ID/community-hero:latest

options:
  machineType: N1_HIGHCPU_8

substitutions:
  _REGION: us-central1
  _SERVICE_NAME: community-hero-backend
